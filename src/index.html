        .md3-dialog {
            --md-dialog-container-color: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            background: linear-gradient(160deg, rgba(255,255,255,0.9) 0%, rgba(245,248,255,0.85) 100%);

            max-width: 400px;
            width: calc(100% - 48px);
            margin: auto !important;
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            border: none;
            padding: 0;
            z-index: 1100;
            animation: dialogFadeIn 0.25s cubic-bezier(0.05, 0.7, 0.1, 1.0) !important;
        }
        @keyframes dialogFadeIn {
            from { opacity: 0; transform: translate(-50%, -48%) scale(0.92); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        md-dialog::backdrop { background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); }

        .md3-dialog [slot="content"] { padding: 8px 24px 20px; display: flex; flex-direction: column; gap: 28px; }
        .md3-dialog [slot="actions"] { padding: 0 24px 24px; display: flex; justify-content: flex-end; }

        .md3-dialog .close-btn:hover { background: rgba(0,0,0,.06); color: #1e1e2f; }
        .md3-dialog .close-btn i { font-size: 24px; }

        .emoji-card:hover { background: #f3edf7; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.02); }

<body>
<div class="game-container" role="main">
    <div class="game-header">
        <h1><i class="material-icons">grid_on</i> <span id="mainTitle" data-original="数·占 | 九宫幻卡">数·占 | 九宫幻卡</span> <md-icon-button id="settingsButton"><i class="material-icons">settings</i></md-icon-button></h1>
        <div class="mode-slider-container" id="modeSlider">
            <div class="mode-slider-bg"></div>
            <div class="mode-slider-options">
                <div class="mode-option" data-mode="twoPlayer"><i class="material-icons">group</i> <span class="mode-text" data-original="双人对决">双人对决</span></div>
                <div class="mode-option" data-mode="vsAI"><i class="material-icons">smart_toy</i> <span class="mode-text" data-original="人机对战">人机对战</span></div>
                <div class="mode-option" data-mode="online"><i class="material-icons">language</i> <span class="mode-text" data-original="联机对决">联机对决</span></div>
            </div>
        </div>
    </div>
    <div class="action-group">
        <button class="reset-btn" id="resetGameBtn"><i class="material-icons">refresh</i> <span class="btn-text" data-original="新的一局">新的一局</span></button>
        <button class="ai-first-btn" id="aiFirstBtn" style="display:none;"><i class="material-icons">psychology</i> <span class="btn-text" data-original="AI先手">AI先手</span></button>
    </div>
    <div id="onlinePanel" style="display:none;" class="online-panel">
        <div>
            <button id="createRoomBtn" class="online-action-btn"><i class="material-icons">create_new_folder</i> <span class="btn-text" data-original="创建房间">创建房间</span></button>
            <md-outlined-text-field id="joinRoomInput" data-original="房间号" value=""></md-outlined-text-field>
            <button id="joinRoomBtn" class="online-action-btn"><i class="material-icons">login</i> <span class="btn-text" data-original="加入房间">加入房间</span></button>
        </div>
        <div id="roomStatus" class="online-room-info"><i class="material-icons">info</i> <span id="roomStatusText" data-original="未加入房间">未加入房间</span></div>
    </div>
    <div class="status-area">
        <div class="turn-indicator"><span id="turnLabel" data-original="当前回合">当前回合</span><div class="turn-badge" id="turnBadge"><i class="material-icons">person</i> <span id="turnPlayer" data-original="玩家 1">玩家 1</span></div></div>
        <div class="status-message" id="statusMsg"><i class="material-icons">info</i> <span id="statusText" data-original="点击手牌，再点棋盘空格">点击手牌，再点棋盘空格</span></div>
    </div>
    <div class="game-layout">
        <div class="board" id="board"></div>
        <div class="hand-area" id="handArea">
            <div class="hand-title"><div class="hand-title-left"><i class="material-icons">style</i> <span id="handTitle" data-original="当前手牌">当前手牌</span></div><button class="emoji-toggle-btn" id="emojiToggleBtn"><i class="material-icons">mood</i></button></div>
            <div class="cards-hand" id="handCardsContainer"></div>
        </div>
    </div>
    <div class="footer-note"><i class="material-icons">psychology_alt</i> <span id="footerNote" data-original="放置卡牌 → 相邻方向比拼，大于则夺取控制权 ✦">放置卡牌 → 相邻方向比拼，大于则夺取控制权 ✦</span></div>
</div>

<md-dialog id="settingsDialog" class="md3-dialog">
    <div slot="headline"><span id="settingsTitle" data-original="游戏设置">游戏设置</span> <button class="close-btn" onclick="document.getElementById('settingsDialog').close()"><i class="material-icons">close</i></button></div>
    <form slot="content" id="settingsForm" method="dialog">
        <div class="settings-item"><label for="chainAttackSwitch"><span data-original="连锁攻击">连锁攻击</span></label><md-switch id="chainAttackSwitch"></md-switch></div>
        <div class="settings-item"><label for="animStyleSwitch"><span data-original="顺序播放">顺序播放</span></label><md-switch id="animStyleSwitch" checked></md-switch></div>
        <div class="settings-item"><label for="soundToggle"><span data-original="音效">音效</span></label><md-switch id="soundToggle"></md-switch></div>
        <div class="settings-item"><label for="killAudioSwitch"><span data-original="击杀音效">击杀音效</span></label><md-switch id="killAudioSwitch"></md-switch></div>
        <div class="settings-item"><label for="bgmSwitch"><span data-original="背景音乐">背景音乐</span></label><md-switch id="bgmSwitch"></md-switch></div>
        <div class="settings-item">
            <label for="langSelect"><span data-original="语言">语言</span></label>
            <md-outlined-select id="langSelect" aria-label="选择语言"></md-outlined-select>
        </div>
        <div class="settings-item slider-container"><label for="demoSlider"><span data-original="演示滑块">演示滑块</span></label><div class="slider-wrapper"><md-slider id="demoSlider" min="0" max="100" value="30" labeled></md-slider></div></div>
    </form>
    <div slot="actions"><md-text-button form="settingsForm" value="close"><span data-original="关闭">关闭</span></md-text-button></div>
</md-dialog>

<md-dialog id="emojiDialog" class="md3-dialog">
    <div slot="headline"><span data-original="表情面板">表情面板</span> <button class="close-btn" id="emojiCloseBtn"><i class="material-icons">close</i></button></div>
    <div slot="content"><div class="emoji-grid" id="emojiGrid"></div></div>
    <div slot="actions"><md-text-button id="emojiCancelBtn"><span data-original="关闭">关闭</span></md-text-button></div>
</md-dialog>

<div class="emoji-toast" id="emojiToast" style="display:none;">
    <img id="toastEmojiImg" src="" alt=""><div class="toast-sender" id="toastSender"></div><div class="toast-emoji-name" id="toastEmojiName"></div>
</div>

<script>
    (function(){
        const CARD_DATA = {
            "四色花": { up:1, left:2, down:3, right:4 },
            "倒·四色花": { up:2, left:3, down:4, right:1 },
            "五色花": { up:3, left:4, down:1, right:2 },
            "倒·五色花": { up:4, left:1, down:2, right:3 },
            "三相团子": { up:0, left:1, down:9999, right:1 },
            "小电视": { up:2, left:3, down:2, right:3 },
            "OuO": { up:3, left:2, down:2, right:2 }
        };
        const CARD_EMOJI = { "四色花":"🌸","倒·四色花":"🌼","五色花":"🌺","倒·五色花":"🏵️","三相团子":"🍡","小电视":"📺","OuO":"😊" };
        const ALL_CARD_NAMES = Object.keys(CARD_DATA);
        function getCardObjByName(name) { return { name, ...CARD_DATA[name] }; }
        function formatVal(val) { return val === 9999 ? '<span class="inf-symbol">∞</span>' : val; }
        function getCardEmoji(name) { return CARD_EMOJI[name] || "🎴"; }

        // ===== 多语言系统（动态加载，简体中文为默认回退） =====
        let langData = {};
        let currentLang = 'zh';
        let availableLangs = [];
        const defaultTexts = new Map();
        function captureDefaultTexts() {
            document.querySelectorAll('[data-original]').forEach(el => {
                const original = el.getAttribute('data-original');
                if (original) defaultTexts.set(original, original);
            });
        }
        captureDefaultTexts();

        async function loadLanguage(lang) {
            if (lang === 'zh') { langData = {}; return true; }
            try {
                const res = await fetch(`lang/${lang}.json`);
                if (!res.ok) throw new Error();
                langData = await res.json();
                return true;
            } catch(e) { console.warn(`加载语言 ${lang} 失败，回退简体中文`); langData = {}; return false; }
        }

        function applyLang(text) {
            if (langData[text] !== undefined) return langData[text];
            return defaultTexts.get(text) || text;
        }

        function updateStaticTexts() {
            // 普通元素
            document.querySelectorAll('[data-original]').forEach(el => {
                const original = el.getAttribute('data-original');
                if (original) {
                    const translated = applyLang(original);
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = translated;
                    else el.textContent = translated;
                }
            });
            // 更新 md-outlined-text-field 的 label
            document.querySelectorAll('md-outlined-text-field[data-original]').forEach(el => {
                const original = el.getAttribute('data-original');
                if (original) el.label = applyLang(original);
            });
            updateLangSelectDisplay();
        }

        function updateLangSelectDisplay() {
            const select = document.getElementById('langSelect');
            if (!select) return;
            Array.from(select.querySelectorAll('md-select-option')).forEach(opt => {
                const code = opt.value;
                if (code === 'zh') return;
                const langInfo = availableLangs.find(l => l.code === code);
                if (langInfo && langData[langInfo.name]) {
                    const headlineDiv = opt.querySelector('[slot="headline"]');
                    if (headlineDiv) headlineDiv.textContent = applyLang(langInfo.name);
                }
            });
        }

        async function loadLanguageList() {
            try {
                const res = await apiCall('game_get_languages');
                if (res.success && res.languages) availableLangs = res.languages;
                else availableLangs = [];
            } catch(e) { availableLangs = []; }
            const select = document.getElementById('langSelect');
            if (!select) return;
            select.innerHTML = '';
            const defaultOption = document.createElement('md-select-option');
            defaultOption.value = 'zh';
            defaultOption.innerHTML = '<div slot="headline">简体中文 (默认)</div>';
            select.appendChild(defaultOption);
            for (const lang of availableLangs) {
                const option = document.createElement('md-select-option');
                option.value = lang.code;
                option.innerHTML = `<div slot="headline">${lang.name}</div>`;
                select.appendChild(option);
            }
            const savedLang = localStorage.getItem('game_lang') || 'zh';
            currentLang = savedLang;
            select.value = currentLang;
            if (currentLang !== 'zh') await loadLanguage(currentLang);
            else langData = {};
            updateStaticTexts();
            select.addEventListener('change', async (e) => {
                const newLang = e.target.value;
                currentLang = newLang;
                localStorage.setItem('game_lang', newLang);
                if (newLang !== 'zh') await loadLanguage(newLang);
                else langData = {};
                updateStaticTexts();
                playSound('switch');
                updateLocalTurnUI();
                updateOnlineTurnUI();
                updateOnlinePanelUI();
            });
        }

        // ===== 音效系统 =====
        let soundEnabled = false;
        let killAudioEnabled = false;
        let bgmEnabled = false;
        let bgmAudio = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const killAudioBuffers = {};
        const killSoundFiles = {
            1: 'first_blood.ogg',
            2: 'double_kill.ogg',
            3: 'triple_kill.ogg',
            4: 'quadra_kill.ogg',
            5: 'penta_kill.ogg'
        };
        async function preloadKillSounds() {
            for (let count in killSoundFiles) {
                const file = killSoundFiles[count];
                try {
                    const response = await fetch(`data/music/${file}`);
                    if (!response.ok) continue;
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    killAudioBuffers[count] = audioBuffer;
                } catch(e) { console.warn(`预加载击杀音效失败: ${file}`, e); }
            }
        }
        function playKillSound(killCount) {
            if (!killAudioEnabled) return;
            let key = killCount;
            if (key > 5) key = 5;
            const buffer = killAudioBuffers[key];
            if (!buffer) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => playBuffer(buffer)).catch(e => console.log);
            } else { playBuffer(buffer); }
        }
        function playBuffer(buffer) {
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start();
        }
        function initBGM() {
            if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }
            bgmAudio = new Audio('data/music/music.ogg');
            bgmAudio.loop = true;
            bgmAudio.preload = 'auto';
        }
        function startBGM() {
            if (!bgmEnabled) return;
            if (!bgmAudio) initBGM();
            bgmAudio.play().catch(e => {
                const unlockBGM = () => {
                    if (bgmEnabled && bgmAudio && bgmAudio.paused) bgmAudio.play().catch(err => console.log);
                    document.body.removeEventListener('click', unlockBGM);
                };
                document.body.addEventListener('click', unlockBGM, { once: true });
            });
        }
        function stopBGM() { if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; } }
        function playSound(type) {
            if (!soundEnabled) return;
            if (audioCtx.state === 'suspended') audioCtx.resume().catch(e=>console.log);
            try {
                const now = audioCtx.currentTime;
                switch(type) {
                    case 'place': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(200,now); o.frequency.exponentialRampToValueAtTime(120,now+.1); g.gain.setValueAtTime(.4,now); g.gain.exponentialRampToValueAtTime(.01,now+.15); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.15); break; }
                    case 'flip': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(800,now); o.frequency.exponentialRampToValueAtTime(300,now+.05); g.gain.setValueAtTime(.3,now); g.gain.exponentialRampToValueAtTime(.01,now+.08); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.08); break; }
                    case 'click': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(600,now); g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.01,now+.06); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.06); break; }
                    case 'switch': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(1000,now); g.gain.setValueAtTime(.1,now); g.gain.exponentialRampToValueAtTime(.01,now+.04); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.04); break; }
                    case 'victory': { [440,554,659].forEach((f,i)=>{ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; const t=now+i*.12; o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(.3,t); g.gain.exponentialRampToValueAtTime(.01,t+.15); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+.15); }); break; }
                    case 'draw': { [330,392].forEach((f,i)=>{ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; const t=now+i*.2; o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.01,t+.25); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+.25); }); break; }
                    case 'turn': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(1200,now); g.gain.setValueAtTime(.15,now); g.gain.exponentialRampToValueAtTime(.01,now+.08); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.08); break; }
                    case 'emoji': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(660,now); o.frequency.setValueAtTime(880,now+.05); g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.01,now+.1); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.1); break; }
                }
            } catch(e) {}
        }
        function unlockAudio() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (bgmEnabled && bgmAudio && bgmAudio.paused) bgmAudio.play().catch(e=>console.log);
        }
        document.body.addEventListener('click', function once() { unlockAudio(); }, { once: true });

        let localGrid = Array(9).fill(null);
        let localHandP1 = [], localHandP2 = [];
        let localCurrentTurn = 1;
        let localGameActive = true;
        let localWinnerDeclared = false;
        let localSelectedCardIndex = -1;
        let aiTimeout = null;
        let chainAttackEnabled = false;
        let sequentialAnimEnabled = true;

        let onlineRoomId = null, onlineMyRole = null, onlineGrid = Array(9).fill(null), onlineMyHand = [], onlineCurrentTurn = 1, onlineGameActive = false, onlineWinner = null, onlineSelectedCardIndex = -1;
        let eventSource = null, onlineStateHash = '', lastOnlineStatus = null, lastReceivedEmojiKey = null;
        let currentGameMode = "twoPlayer", emojiList = [];

        const boardDiv = document.getElementById("board"), handContainer = document.getElementById("handCardsContainer"), turnBadge = document.getElementById("turnBadge"), statusMsgDiv = document.getElementById("statusMsg"), resetBtn = document.getElementById("resetGameBtn"), aiFirstBtn = document.getElementById("aiFirstBtn"), modeSlider = document.getElementById("modeSlider"), onlinePanel = document.getElementById("onlinePanel");
        const emojiDialog = document.getElementById("emojiDialog"), emojiToggleBtn = document.getElementById("emojiToggleBtn"), emojiCloseBtn = document.getElementById("emojiCloseBtn"), emojiCancelBtn = document.getElementById("emojiCancelBtn"), emojiGrid = document.getElementById("emojiGrid");
        const emojiToast = document.getElementById("emojiToast"), toastEmojiImg = document.getElementById("toastEmojiImg"), toastSender = document.getElementById("toastSender"), toastEmojiName = document.getElementById("toastEmojiName");
        let toastTimer = null;

        function statusMessage(msg, temp=false) {
            const finalMsg = applyLang(msg);
            const html = finalMsg.includes('<i') ? finalMsg : `<i class="material-icons">info</i> ${finalMsg}`;
            statusMsgDiv.innerHTML = html;
            if (temp) setTimeout(() => {
                if (statusMsgDiv.innerHTML === html && (currentGameMode !== "online" ? localGameActive : true))
                    statusMsgDiv.innerHTML = `<i class="material-icons">info</i> ${applyLang("点击手牌，再点棋盘空格")}`;
            }, 1500);
        }

        function updateTurnBadge(html) { turnBadge.innerHTML = html; }

        function showEmojiToast(emojiName, senderRole, isSelf = false) {
            if (toastTimer) { clearTimeout(toastTimer); emojiToast.classList.remove('fade-out'); }
            toastEmojiImg.src = `data/webp/${emojiName}.webp`; toastEmojiImg.alt = emojiName;
            toastEmojiName.textContent = emojiName;
            const sender = isSelf ? applyLang("你发送了表情") : `${applyLang(senderRole === 1 ? "炎之阵" : "水之阵")} ${applyLang("发送了表情")}`;
            toastSender.textContent = sender;
            emojiToast.style.display = 'flex';
            emojiToast.classList.remove('fade-out');
            toastTimer = setTimeout(() => {
                emojiToast.classList.add('fade-out');
                setTimeout(() => { emojiToast.style.display = 'none'; }, 250);
            }, 1500);
        }

        function renderBoard(grid, placedIdx = -1, skipFlipIds = []) {
            const slots = document.querySelectorAll("#board .card-slot");
            for (let i = 0; i < 9; i++) {
                if (skipFlipIds.includes(i)) continue;
                const slot = slots[i], cell = grid[i];
                if (!cell) {
                    slot.className = "card-slot empty-slot";
                    slot.innerHTML = `⬚`;
                    slot.style.animation = "none";
                } else {
                    const card = getCardObjByName(cell.cardName);
                    const ownerClass = cell.owner === 1 ? "owner1" : "owner2";
                    const innerHTML = `<div class="card-layout"><div class="card-name-tag">${card.name}</div><div class="card-top">${formatVal(card.up)}</div><div class="card-middle"><div class="card-left">${formatVal(card.left)}</div><div class="card-emoji">${getCardEmoji(card.name)}</div><div class="card-right">${formatVal(card.right)}</div></div><div class="card-bottom">${formatVal(card.down)}</div></div>`;
                    if (i === placedIdx) {
                        slot.className = `card-slot ${ownerClass}`;
                        slot.innerHTML = innerHTML;
                        slot.style.animation = "none"; void slot.offsetWidth;
                        slot.style.animation = "placeCard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards";
                    } else {
                        slot.className = `card-slot ${ownerClass}`;
                        slot.innerHTML = innerHTML;
                        slot.style.animation = "none";
                    }
                }
            }
        }

        function initBoardDOM() {
            boardDiv.innerHTML = "";
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement("div");
                slot.classList.add("card-slot", "empty-slot");
                slot.innerHTML = `⬚`;
                slot.addEventListener("click", () => onSlotClick(i));
                boardDiv.appendChild(slot);
            }
        }

        function calculateFlips(index, owner, card, grid, enableChain) {
            let allFlipped = [], queue = [index], visited = new Set([index]);
            while (queue.length) {
                const cur = queue.shift();
                const neighbors = [
                    { my:"up", opp:"down", nIdx: cur-3, valid: cur-3>=0 },
                    { my:"down", opp:"up", nIdx: cur+3, valid: cur+3<9 },
                    { my:"left", opp:"right", nIdx: cur-1, valid: cur%3!=0 },
                    { my:"right", opp:"left", nIdx: cur+1, valid: cur%3!=2 }
                ];
                for (let n of neighbors) {
                    if (!n.valid) continue;
                    const nIdx = n.nIdx;
                    if (visited.has(nIdx)) continue;
                    visited.add(nIdx);
                    const neighbor = grid[nIdx];
                    if (!neighbor || neighbor.owner === owner) continue;
                    const neighborCard = getCardObjByName(neighbor.cardName);
                    let myCard = cur === index ? card : getCardObjByName(grid[cur].cardName);
                    let myVal = myCard[n.my] === 9999 ? Infinity : myCard[n.my];
                    let oppVal = neighborCard[n.opp] === 9999 ? Infinity : neighborCard[n.opp];
                    if (myVal > oppVal) {
                        allFlipped.push(nIdx);
                        if (enableChain) queue.push(nIdx);
                    }
                }
            }
            return allFlipped;
        }

        function singleFlipAnimation(slot, newOwner) {
            return new Promise(resolve => {
                slot.style.animation = "flipCardOut 0.2s ease-in forwards";
                playSound('flip');
                setTimeout(() => {
                    const card = getCardObjByName(slot.__cardName);
                    const ownerClass = newOwner === 1 ? "owner1" : "owner2";
                    slot.className = `card-slot ${ownerClass}`;
                    slot.innerHTML = `<div class="card-layout"><div class="card-name-tag">${card.name}</div><div class="card-top">${formatVal(card.up)}</div><div class="card-middle"><div class="card-left">${formatVal(card.left)}</div><div class="card-emoji">${getCardEmoji(card.name)}</div><div class="card-right">${formatVal(card.right)}</div></div><div class="card-bottom">${formatVal(card.down)}</div></div>`;
                    slot.style.animation = "flipCardIn 0.2s ease-out forwards";
                    resolve();
                }, 200);
            });
        }

        async function animateSequential(grid, flippedIdxs, owner) {
            const slots = document.querySelectorAll("#board .card-slot");
            for (let i = 0; i < flippedIdxs.length; i++) {
                const idx = flippedIdxs[i];
                slots[idx].__cardName = grid[idx].cardName;
                await singleFlipAnimation(slots[idx], owner);
                if (i < flippedIdxs.length - 1) await new Promise(r => setTimeout(r, 150));
            }
        }

        function animateSimultaneous(grid, flippedIdxs, owner) {
            const slots = document.querySelectorAll("#board .card-slot");
            return Promise.all(flippedIdxs.map(idx => {
                slots[idx].__cardName = grid[idx].cardName;
                return singleFlipAnimation(slots[idx], owner);
            }));
        }

        function animateOnlineFlips(flippedIdxs) {
            const slots = document.querySelectorAll("#board .card-slot");
            flippedIdxs.forEach(idx => {
                const slot = slots[idx];
                if (!slot) return;
                playSound('flip');
                slot.style.animation = "flipCardOut 0.2s ease-in forwards";
                setTimeout(() => { slot.style.animation = "flipCardIn 0.2s ease-out forwards"; }, 200);
            });
        }

        function localPlaceCard(slotIndex, cardObj, cardIndex) {
            if (!localGameActive || localGrid[slotIndex] !== null) return false;
            if (localCurrentTurn !== 1 && localCurrentTurn !== 2) return false;
            localGameActive = false;
            localGrid[slotIndex] = { cardName: cardObj.name, owner: localCurrentTurn };
            playSound('place');
            const flipped = calculateFlips(slotIndex, localCurrentTurn, cardObj, localGrid, chainAttackEnabled);
            for (let idx of flipped) localGrid[idx].owner = localCurrentTurn;
            renderBoard(localGrid, slotIndex, flipped);
            if (flipped.length > 0) {
                if (sequentialAnimEnabled) animateSequential(localGrid, flipped, localCurrentTurn);
                else animateSimultaneous(localGrid, flipped, localCurrentTurn);
                playKillSound(flipped.length);
            }
            const handArr = localCurrentTurn === 1 ? localHandP1 : localHandP2;
            if (cardIndex >= 0 && cardIndex < handArr.length) handArr.splice(cardIndex, 1);
            localSelectedCardIndex = -1;
            localCurrentTurn = localCurrentTurn === 1 ? 2 : 1;
            const newHand = localCurrentTurn === 1 ? localHandP1 : localHandP2;
            if (localGrid.every(c => c !== null) || newHand.length === 0) { endLocalGame(); renderLocalHand(true); return true; }
            renderLocalHand(true);
            updateLocalTurnUI();
            statusMessage(applyLang('回合切换 → ') + applyLang(localCurrentTurn === 1 ? '炎之阵' : '水之阵'));
            playSound('turn');
            localGameActive = true;
            if (currentGameMode === "vsAI" && localCurrentTurn === 2) setTimeout(() => { if (localGameActive && localCurrentTurn === 2) triggerAITurn(); }, 250);
            return true;
        }

        function endLocalGame() {
            localGameActive = false; localWinnerDeclared = true;
            let p1=0,p2=0;
            localGrid.forEach(c=>{ if(c) c.owner===1?p1++:p2++; });
            let msg = p1>p2 ? applyLang('🏆 炎之阵获胜！') : (p2>p1 ? applyLang('🏆 水之阵获胜！') : applyLang('🤝 平局'));
            statusMessage(msg);
            updateTurnBadge('<i class="material-icons">flag</i> ' + applyLang('终局'));
            handContainer.innerHTML = '';
            if (p1 > p2 || p2 > p1) playSound('victory');
            else playSound('draw');
        }

        function updateLocalTurnUI() {
            let turnName = localCurrentTurn === 1 ? '炎之阵' : '水之阵';
            if (currentGameMode === "vsAI") {
                if (localCurrentTurn === 1) turnName = applyLang('炎之阵') + applyLang(' (你)');
                else turnName = applyLang('AI ') + applyLang(turnName);
            } else {
                turnName = applyLang(turnName);
            }
            const icon = localCurrentTurn === 1 ? 'person' : 'smart_toy';
            updateTurnBadge(`<i class="material-icons">${icon}</i> ${turnName}`);
        }

        function renderLocalHand(force=false) {
            const currentHand = localCurrentTurn === 1 ? localHandP1 : localHandP2;
            if (!localGameActive && localWinnerDeclared) { handContainer.innerHTML = ''; return; }
            if (currentHand.length === 0) {
                handContainer.innerHTML = '<div style="padding:20px;text-align:center;">' + applyLang('无可用手牌') + '</div>';
                return;
            }
            if (force) {
                handContainer.innerHTML = "";
                const bgClass = localCurrentTurn === 1 ? "owner1-bg" : "owner2-bg";
                currentHand.forEach((card, idx) => {
                    const div = document.createElement("div");
                    div.className = `hand-card ${bgClass}`;
                    if (localSelectedCardIndex === idx) div.classList.add("selected");
                    div.style.animation = `slideInUp 0.3s ease-out ${idx * 0.05}s backwards`;
                    div.innerHTML = `<div class="card-layout"><div class="card-name-tag">${card.name}</div><div class="card-top">${formatVal(card.up)}</div><div class="card-middle"><div class="card-left">${formatVal(card.left)}</div><div class="card-emoji">${getCardEmoji(card.name)}</div><div class="card-right">${formatVal(card.right)}</div></div><div class="card-bottom">${formatVal(card.down)}</div></div>`;
                    div.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if (!localGameActive) return;
                        if (localSelectedCardIndex === idx) {
                            localSelectedCardIndex = -1;
                            statusMessage(applyLang("已取消选中"));
                        } else {
                            localSelectedCardIndex = idx;
                            statusMessage(applyLang("选中「") + card.name + applyLang("」, 点击棋盘放置"));
                        }
                        renderLocalHand(false);
                    });
                    handContainer.appendChild(div);
                });
            } else {
                document.querySelectorAll('#handCardsContainer .hand-card').forEach((card, idx) => card.classList.toggle("selected", idx === localSelectedCardIndex));
            }
        }

        function generateRandomHand() { return Array.from({length:5}, ()=>getCardObjByName(ALL_CARD_NAMES[Math.floor(Math.random()*ALL_CARD_NAMES.length)])); }

        function resetLocalGame(aiFirst=false) {
            if (aiTimeout) clearTimeout(aiTimeout);
            localGrid = Array(9).fill(null);
            localHandP1 = generateRandomHand(); localHandP2 = generateRandomHand();
            localSelectedCardIndex = -1;
            localCurrentTurn = (aiFirst && currentGameMode==="vsAI") ? 2 : 1;
            localGameActive = true; localWinnerDeclared = false;
            initBoardDOM(); renderBoard(localGrid);
            renderLocalHand(true); updateLocalTurnUI();
            if (aiFirst && currentGameMode==="vsAI") {
                statusMessage(applyLang("🤖 AI先手..."));
                triggerAITurn();
            } else statusMessage(applyLang("新对局！点击手牌再点格子"));
        }

        function getAIMove() {
            let best={slot:null,cardIdx:0,score:-1};
            const empty=localGrid.map((c,i)=>c===null?i:-1).filter(i=>i!==-1);
            if(empty.length===0||localHandP2.length===0) return null;
            for(let ci=0;ci<localHandP2.length;ci++){
                for(let slot of empty){
                    let flip=0;
                    const neighbors=[{idx:slot-3,my:"up",opp:"down"},{idx:slot+3,my:"down",opp:"up"},{idx:slot-1,my:"left",opp:"right",v:slot%3!==0},{idx:slot+1,my:"right",opp:"left",v:slot%3!==2}];
                    for(let n of neighbors){
                        if(n.v===false) continue;
                        if(n.idx>=0&&n.idx<9&&localGrid[n.idx]&&localGrid[n.idx].owner!==2){
                            let oppVal=getCardObjByName(localGrid[n.idx].cardName)[n.opp];
                            let myVal=localHandP2[ci][n.my]===9999?Infinity:localHandP2[ci][n.my];
                            if(myVal>(oppVal===9999?Infinity:oppVal)) flip++;
                        }
                    }
                    let score=flip*10+(localHandP2[ci].up+localHandP2[ci].down+localHandP2[ci].left+localHandP2[ci].right)/4;
                    if(score>best.score) best={slot,cardIdx:ci,score};
                }
            }
            return best;
        }

        function triggerAITurn() {
            if(aiTimeout) clearTimeout(aiTimeout);
            aiTimeout = setTimeout(()=>{
                if(!localGameActive||currentGameMode!=="vsAI"||localCurrentTurn!==2) return;
                const move=getAIMove();
                if(move&&move.slot!==null) localPlaceCard(move.slot, localHandP2[move.cardIdx], move.cardIdx);
            },300);
        }

        // ===== 联机 API =====
        async function apiCall(action, data={}) {
            const formData = new URLSearchParams();
            formData.append("action", action);
            for(let k in data) formData.append(k, data[k]);
            const res = await fetch("api.php", { method:"POST", body:formData, credentials: "same-origin" });
            return await res.json();
        }

        async function createRoom() {
            const res = await apiCall("game_create_room");
            if(res.success) {
                onlineRoomId = res.room_id;
                onlineMyRole = 1;
                updateOnlinePanelUI();
                statusMessage(applyLang("房间创建成功，房间号:") + " " + onlineRoomId + " " + applyLang("等待对手加入..."));
                startOnlineListener();
            } else { statusMessage(applyLang("创建房间失败")); }
        }

        async function joinRoom() {
            const roomInput = document.getElementById("joinRoomInput");
            const roomId = roomInput.value.trim();
            if(!roomId) { statusMessage(applyLang("请输入房间号")); return; }
            const res = await apiCall("game_join_room", { room_id: roomId });
            if(res.success) {
                onlineRoomId = roomId;
                onlineMyRole = 2;
                updateOnlinePanelUI();
                statusMessage(applyLang("加入成功，等待游戏开始..."));
                startOnlineListener();
            } else { statusMessage(res.message || applyLang("加入失败")); }
        }

        async function leaveRoom() {
            if(onlineRoomId) await apiCall("game_leave_room", { room_id: onlineRoomId });
            stopOnlineListener();
            onlineRoomId = null; onlineMyRole = null;
            onlineGrid = Array(9).fill(null);
            onlineMyHand = [];
            onlineGameActive = false;
            onlineWinner = null;
            onlineSelectedCardIndex = -1;
            lastOnlineStatus = null;
            lastReceivedEmojiKey = null;
            onlineStateHash = '';
            updateOnlinePanelUI();
            statusMessage(applyLang("已离开房间"));
            renderBoard(onlineGrid);
            handContainer.innerHTML = '<div style="padding:20px;text-align:center;"><i class="material-icons">meeting_room</i> ' + applyLang('未加入房间') + '</div>';
            updateTurnBadge('<i class="material-icons">pause</i> --');
        }

        function handleOnlineState(state) {
            const currentStatus = state.status;
            const statusChangedToPlaying = (lastOnlineStatus === "waiting" && currentStatus === "playing");
            lastOnlineStatus = currentStatus;
            if (currentStatus === "waiting") {
                statusMessage(applyLang("等待对手加入..."));
                onlineGameActive = false;
                renderBoard([]);
                handContainer.innerHTML = '<div style="padding:20px;text-align:center;">' + applyLang("等待对手...") + '</div>';
                updateTurnBadge('<i class="material-icons">schedule</i> ' + applyLang("等待中"));
                return;
            }
            const newGrid = state.grid || [];
            const oldGridStr = JSON.stringify(onlineGrid);
            const newHandRaw = (onlineMyRole === 1) ? state.player1_hand : state.player2_hand;
            const newHand = newHandRaw.map(c => getCardObjByName(c.name));
            let placedIdx = -1; let flippedIdxs = [];
            if (oldGridStr !== JSON.stringify(newGrid)) {
                for (let i=0;i<9;i++) {
                    const oldCell = JSON.parse(oldGridStr)[i];
                    const newCell = newGrid[i];
                    if (!oldCell && newCell) placedIdx = i;
                    else if (oldCell && newCell && oldCell.owner !== newCell.owner) flippedIdxs.push(i);
                }
            }
            onlineGrid = newGrid;
            onlineCurrentTurn = state.current_turn;
            onlineGameActive = (state.status === "playing");
            onlineWinner = state.winner;
            renderBoard(onlineGrid, placedIdx);
            if (flippedIdxs.length > 0) {
                animateOnlineFlips(flippedIdxs);
                playKillSound(flippedIdxs.length);
            }
            const handChanged = (JSON.stringify(onlineMyHand.map(c=>c.name)) !== JSON.stringify(newHand.map(c=>c.name)));
            onlineMyHand = newHand;
            if (handChanged || statusChangedToPlaying) renderOnlineHand(true);
            else renderOnlineHand(false);
            updateOnlineTurnUI();
            if (state.last_emoji) handleIncomingEmoji(state);
            else lastReceivedEmojiKey = null;
            if(onlineWinner) {
                let winMsg = onlineWinner === 1 ? applyLang("🔥 炎之阵玩家获胜！") : (onlineWinner === 2 ? applyLang("💧 水之阵玩家获胜！") : applyLang("🤝 平局！"));
                statusMessage(winMsg);
                updateTurnBadge('<i class="material-icons">flag</i> ' + applyLang('终局'));
                handContainer.innerHTML = '<div style="padding:20px;text-align:center;">' + applyLang("游戏结束") + '</div>';
                stopOnlineListener();
            } else if(onlineGameActive && onlineCurrentTurn === onlineMyRole) {
                statusMessage(applyLang("轮到你了，请出牌"));
            } else if(onlineGameActive) {
                statusMessage(applyLang("等待对手出牌..."));
            }
        }

        function startOnlineListener() {
            if (eventSource) eventSource.close();
            const url = `api.php?action=game_listen&room_id=${onlineRoomId}&hash=${onlineStateHash}`;
            eventSource = new EventSource(url);
            eventSource.onmessage = function(e) {
                try {
                    const data = JSON.parse(e.data);
                    if (data.error) {
                        if (data.error === 'not_member' || data.error === 'room_deleted') leaveRoom();
                        return;
                    }
                    if (data.timeout) {
                        onlineStateHash = data.hash;
                        return;
                    }
                    if (data.state) {
                        onlineStateHash = data.hash;
                        handleOnlineState(data.state);
                    }
                } catch(err) {}
            };
            eventSource.onerror = function() {
                statusMessage(applyLang("连接中断，正在重连..."), true);
            };
        }

        function stopOnlineListener() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
        }

        async function fetchGameState() {
            if(!onlineRoomId) return;
            const res = await apiCall("game_get_state", { room_id: onlineRoomId });
            if(res.success) handleOnlineState(res.state);
            else if(res.message === "房间不存在") { leaveRoom(); statusMessage(applyLang("房间已失效")); }
        }

        function renderOnlineHand(force=false) {
            if (!onlineMyHand.length) {
                handContainer.innerHTML = '<div style="padding:20px;text-align:center;">' + applyLang("无手牌") + '</div>';
                return;
            }
            if (force) {
                handContainer.innerHTML = "";
                const bgClass = onlineMyRole === 1 ? "owner1-bg" : "owner2-bg";
                onlineMyHand.forEach((card, idx) => {
                    const div = document.createElement("div");
                    div.className = `hand-card ${bgClass}`;
                    if (onlineSelectedCardIndex === idx) div.classList.add("selected");
                    div.style.animation = `slideInUp 0.3s ease-out ${idx * 0.05}s backwards`;
                    div.innerHTML = `<div class="card-layout"><div class="card-name-tag">${card.name}</div><div class="card-top">${formatVal(card.up)}</div><div class="card-middle"><div class="card-left">${formatVal(card.left)}</div><div class="card-emoji">${getCardEmoji(card.name)}</div><div class="card-right">${formatVal(card.right)}</div></div><div class="card-bottom">${formatVal(card.down)}</div></div>`;
                    div.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if(!onlineGameActive || onlineCurrentTurn !== onlineMyRole) { statusMessage(applyLang("现在不是你的回合")); return; }
                        if(onlineSelectedCardIndex === idx) {
                            onlineSelectedCardIndex = -1;
                            statusMessage(applyLang("已取消选中"));
                        } else {
                            onlineSelectedCardIndex = idx;
                            statusMessage(applyLang("选中「") + card.name + applyLang("」, 点击棋盘放置"));
                        }
                        renderOnlineHand(false);
                    });
                    handContainer.appendChild(div);
                });
            } else {
                const cards = handContainer.querySelectorAll('.hand-card');
                cards.forEach((card, idx) => { card.classList.toggle("selected", onlineSelectedCardIndex === idx); });
            }
        }

        async function onlinePlaceCard(slotIndex, cardIndex) {
            if(!onlineGameActive || onlineCurrentTurn !== onlineMyRole) { statusMessage(applyLang("未到你的回合")); return; }
            const cards = handContainer.querySelectorAll('.hand-card');
            if (cards[cardIndex]) cards[cardIndex].classList.add('fade-out');
            const res = await apiCall("game_place_card", { room_id: onlineRoomId, slot: slotIndex, card_idx: cardIndex });
            if(res.success) {
                onlineSelectedCardIndex = -1;
                await fetchGameState();
            } else {
                statusMessage(res.message || applyLang("出牌失败"));
                if (cards[cardIndex]) cards[cardIndex].classList.remove('fade-out');
            }
        }

        function handleIncomingEmoji(state) {
            if (!state.last_emoji) return;
            const incoming = state.last_emoji;
            const key = `${incoming.sender}-${incoming.emoji}-${incoming.time}`;
            if (lastReceivedEmojiKey === key) return;
            lastReceivedEmojiKey = key;
            if (incoming.sender !== onlineMyRole) showEmojiToast(incoming.emoji, incoming.sender, false);
        }

        function updateOnlineTurnUI() {
            if(!onlineGameActive) return;
            updateTurnBadge(onlineCurrentTurn === onlineMyRole ? `<i class="material-icons">whatshot</i> ${applyLang('你的回合')}` : `<i class="material-icons">water_drop</i> ${applyLang('对手回合')}`);
        }

        function updateOnlinePanelUI() {
            const statusDiv = document.getElementById("roomStatus");
            if(onlineRoomId) {
                statusDiv.innerHTML = `<i class="material-icons">meeting_room</i> ${applyLang('房间:')} ${onlineRoomId} (${onlineMyRole===1?applyLang('房主'):applyLang('成员')}) <button id="leaveRoomBtn" class="online-action-btn" style="margin-left:8px;"><i class="material-icons">exit_to_app</i> ${applyLang('离开')}</button>`;
                const leaveBtn = document.getElementById("leaveRoomBtn");
                if(leaveBtn) leaveBtn.onclick = () => leaveRoom();
            } else {
                statusDiv.innerHTML = '<i class="material-icons">info</i> ' + applyLang('未加入房间');
            }
        }

        function onSlotClick(index) {
            if(currentGameMode === "online") {
                if(onlineSelectedCardIndex !== -1 && onlineMyHand[onlineSelectedCardIndex]) onlinePlaceCard(index, onlineSelectedCardIndex);
                else statusMessage(applyLang("请先点击手牌选中一张卡牌"), true);
            } else {
                if(localSelectedCardIndex === -1) { statusMessage(applyLang("请先点击手牌选中一张卡牌"), true); return; }
                const hand = localCurrentTurn === 1 ? localHandP1 : localHandP2;
                if(localSelectedCardIndex >= hand.length) return;
                localPlaceCard(index, hand[localSelectedCardIndex], localSelectedCardIndex);
            }
        }

        function setGameMode(mode) {
            currentGameMode = mode;
            modeSlider.classList.remove("active-twoPlayer","active-vsAI","active-online");
            modeSlider.classList.add(`active-${mode}`);
            aiFirstBtn.style.display = mode === "vsAI" ? "inline-flex" : "none";
            onlinePanel.style.display = mode === "online" ? "block" : "none";
            if(mode === "online") {
                if(aiTimeout) clearTimeout(aiTimeout);
                stopOnlineListener();
                onlineRoomId = null; onlineMyRole = null;
                onlineGrid = Array(9).fill(null);
                onlineMyHand = [];
                onlineGameActive = false;
                onlineWinner = null;
                onlineSelectedCardIndex = -1;
                lastOnlineStatus = null;
                lastReceivedEmojiKey = null;
                onlineStateHash = '';
                renderBoard(onlineGrid);
                handContainer.innerHTML = '<div style="padding:20px;text-align:center;"><i class="material-icons">link_off</i> ' + applyLang('未加入房间') + '</div>';
                updateTurnBadge('<i class="material-icons">language</i> ' + applyLang('联机对决'));
                statusMessage(applyLang("联机模式：创建或加入房间开始对战"));
                updateOnlinePanelUI();
            } else {
                stopOnlineListener();
                resetLocalGame(false);
            }
        }

        async function loadEmojiList() {
            try { const res = await apiCall('game_get_emojis'); if(res.success) { emojiList = res.emojis; renderEmojiGrid(); } } catch(e){}
        }

        function renderEmojiGrid() {
            if(!emojiGrid) return;
            emojiGrid.innerHTML = '';
            if(emojiList.length===0) {
                emojiGrid.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:20px;color:#5e5e6e;">' + applyLang('暂无表情') + '</div>';
                return;
            }
            emojiList.forEach(name => {
                const card = document.createElement('div');
                card.className = 'emoji-card';
                card.setAttribute('data-emoji', name);
                const img = document.createElement('img');
                img.src = `data/webp/${name}.webp`;
                img.alt = name;
                img.loading = 'lazy';
                card.appendChild(img);
                card.addEventListener('click', (e) => { e.stopPropagation(); sendEmoji(card, name); });
                emojiGrid.appendChild(card);
            });
        }

        async function sendEmoji(cardElement, emojiName) {
            cardElement.classList.add('sending');
            showEmojiToast(emojiName, onlineMyRole, true);
            playSound('emoji');
            if(currentGameMode==='online' && onlineRoomId) {
                try {
                    const res = await apiCall('game_send_emoji', { room_id: onlineRoomId, emoji: emojiName });
                    if(!res.success) statusMessage(applyLang(`发送失败: ${res.message}`), true);
                } catch(e) { statusMessage(applyLang('发送表情出错'), true); }
            }
            setTimeout(() => { closeEmojiPanel(); setTimeout(() => cardElement.classList.remove('sending'), 100); }, 300);
        }

        function openEmojiPanel() { if(emojiList.length===0) loadEmojiList().then(()=>emojiDialog.show()); else emojiDialog.show(); }
        function closeEmojiPanel() { emojiDialog.close(); }

        const chainAttackSwitch = document.getElementById('chainAttackSwitch');
        const animStyleSwitch = document.getElementById('animStyleSwitch');
        const soundToggle = document.getElementById('soundToggle');
        const killAudioSwitch = document.getElementById('killAudioSwitch');
        const bgmSwitch = document.getElementById('bgmSwitch');

        if (animStyleSwitch) { sequentialAnimEnabled = animStyleSwitch.selected; animStyleSwitch.addEventListener('change', e => { sequentialAnimEnabled = e.target.selected; statusMessage(sequentialAnimEnabled ? applyLang('顺序播放模式') : applyLang('同步播放模式'), true); playSound('switch'); }); }
        if (chainAttackSwitch) chainAttackSwitch.addEventListener('change', e => { chainAttackEnabled = e.target.selected; statusMessage(chainAttackEnabled ? applyLang('⚡ 连锁攻击已开启') : applyLang('连锁攻击已关闭'), true); playSound('switch'); });
        if (soundToggle) soundToggle.addEventListener('change', e => { soundEnabled = e.target.selected; playSound('switch'); });
        if (killAudioSwitch) { killAudioSwitch.selected = killAudioEnabled; killAudioSwitch.addEventListener('change', e => { killAudioEnabled = e.target.selected; statusMessage(killAudioEnabled ? applyLang('击杀音效已开启') : applyLang('击杀音效已关闭'), true); playSound('switch'); }); }
        if (bgmSwitch) { const savedBGM = localStorage.getItem('game_bgm') === 'true'; bgmEnabled = savedBGM; bgmSwitch.selected = bgmEnabled; bgmSwitch.addEventListener('change', e => { bgmEnabled = e.target.selected; localStorage.setItem('game_bgm', bgmEnabled); if (bgmEnabled) { initBGM(); startBGM(); } else { stopBGM(); } playSound('switch'); statusMessage(bgmEnabled ? applyLang('背景音乐已开启') : applyLang('背景音乐已关闭'), true); }); }

        emojiToggleBtn?.addEventListener('click', openEmojiPanel);
        emojiCloseBtn?.addEventListener('click', () => { playSound('click'); closeEmojiPanel(); });
        emojiCancelBtn?.addEventListener('click', () => { playSound('click'); closeEmojiPanel(); });
        document.getElementById("settingsButton")?.addEventListener('click', () => { playSound('click'); document.getElementById("settingsDialog").show(); });
        document.getElementById("createRoomBtn")?.addEventListener('click', () => { playSound('click'); createRoom(); });
        document.getElementById("joinRoomBtn")?.addEventListener('click', () => { playSound('click'); joinRoom(); });
        resetBtn.addEventListener('click', () => { playSound('click'); if(currentGameMode==="online") leaveRoom(); else resetLocalGame(false); });
        aiFirstBtn.addEventListener('click', () => { playSound('click'); resetLocalGame(true); });
        document.querySelectorAll(".mode-option").forEach(o=>o.addEventListener('click', () => { playSound('click'); setGameMode(o.dataset.mode); }));

        preloadKillSounds();
        if (bgmEnabled) { initBGM(); startBGM(); }

        loadLanguageList().then(() => {
            updateStaticTexts();
            initBoardDOM();
            resetLocalGame(false);
            setGameMode("twoPlayer");
            loadEmojiList();
        });
    })();
</script>
</body>
</html>
