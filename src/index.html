        .md3-dialog {

<body>
<div class="game-container" role="main">
    <div class="game-header">
        <h1><i class="material-icons">grid_on</i> <span>数·占 | 九宫幻卡</span> <md-icon-button id="settingsButton"><i class="material-icons">settings</i></md-icon-button></h1>
        <div class="mode-slider-container" id="modeSlider">
            <div class="mode-slider-bg"></div>
            <div class="mode-slider-options">
                <div class="mode-option" data-mode="twoPlayer"><i class="material-icons">group</i> <span class="mode-text">双人对决</span></div>
                <div class="mode-option" data-mode="vsAI"><i class="material-icons">smart_toy</i> <span class="mode-text">人机对战</span></div>
                <div class="mode-option" data-mode="online"><i class="material-icons">language</i> <span class="mode-text">联机对决</span></div>
            </div>
        </div>
    </div>
    <div class="action-group">
        <button class="reset-btn" id="resetGameBtn"><i class="material-icons">refresh</i> <span class="btn-text">新的一局</span></button>
        <button class="ai-first-btn" id="aiFirstBtn" style="display:none;"><i class="material-icons">psychology</i> <span class="btn-text">AI先手</span></button>
    </div>
    <div class="status-area">
        <div class="turn-indicator"><span>当前回合</span><div class="turn-badge" id="turnBadge"><i class="material-icons">person</i> <span id="turnPlayer">玩家 1</span></div></div>
        <div class="status-message" id="statusMsg"><i class="material-icons">info</i> <span>点击手牌，再点棋盘空格</span></div>
    </div>
    <div class="game-layout">
        <div class="board" id="board"></div>
        <div class="hand-area" id="handArea">
            <div class="hand-title"><div class="hand-title-left"><i class="material-icons">style</i> <span>当前手牌</span></div><button class="emoji-toggle-btn" id="emojiToggleBtn"><i class="material-icons">mood</i></button></div>
            <div class="cards-hand" id="handCardsContainer"></div>
        </div>
    </div>
    <div class="footer-note"><i class="material-icons">psychology_alt</i> <span>放置卡牌 → 相邻方向比拼，大于则夺取控制权 ✦</span></div>
</div>

<md-dialog id="settingsDialog" class="md3-dialog">
    <div slot="headline"><span>游戏设置</span> <button class="close-btn" onclick="document.getElementById('settingsDialog').close()"><i class="material-icons">close</i></button></div>
    <form slot="content" id="settingsForm" method="dialog">
        <div class="settings-item"><label for="chainAttackSwitch"><span>连锁攻击</span></label><md-switch id="chainAttackSwitch"></md-switch></div>
        <div class="settings-item"><label for="animStyleSwitch"><span>顺序播放</span></label><md-switch id="animStyleSwitch" checked></md-switch></div>
        <div class="settings-item"><label for="soundToggle"><span>音效</span></label><md-switch id="soundToggle"></md-switch></div>
        <div class="settings-item"><label for="killAudioSwitch"><span>击杀音效</span></label><md-switch id="killAudioSwitch"></md-switch></div>
        <div class="settings-item"><label for="bgmSwitch"><span>背景音乐</span></label><md-switch id="bgmSwitch"></md-switch></div>
        <div class="settings-item slider-container"><label for="demoSlider"><span>演示滑块</span></label><div class="slider-wrapper"><md-slider id="demoSlider" min="0" max="100" value="30" labeled></md-slider></div></div>
    </form>
    <div slot="actions"><md-text-button form="settingsForm" value="close"><span>关闭</span></md-text-button></div>
</md-dialog>

<md-dialog id="emojiDialog" class="md3-dialog">
    <div slot="headline"><span>表情面板</span> <button class="close-btn" id="emojiCloseBtn"><i class="material-icons">close</i></button></div>
    <div slot="content"><div class="emoji-grid" id="emojiGrid"></div></div>
    <div slot="actions"><md-text-button id="emojiCancelBtn"><span>关闭</span></md-text-button></div>
</md-dialog>

<md-dialog id="linkDialog" class="md3-dialog">
    <div slot="headline">
        <span>进入联机对决版</span> 
        <button class="close-btn" id="linkDialogTopClose"><i class="material-icons">close</i></button>
    </div>
    <div slot="content" style="font-size: 0.9rem; color: #4a5568; line-height: 1.5; font-family: 'Inter', sans-serif;">
        您当前处于 Cloudflare 纯静态特供版。线上实时联机需前往九宫幻卡独立服务器域名：
        <div class="outbound-link-box">
            <i class="material-icons">link</i><span>https://math.youzix.top/</span>
        </div>
    </div>
    <div slot="actions">
        <md-text-button id="linkDialogCancel" style="--md-sys-color-primary: #5a6874;">取消</md-text-button>
        <md-text-button id="linkDialogProceed" style="--md-sys-color-primary: #2c5f8a;">确定前往</md-text-button>
    </div>
</md-dialog>

<div class="emoji-toast" id="emojiToast" style="display:none;">
    <img id="toastEmojiImg" src="" alt=""><div class="toast-sender" id="toastSender"></div><div class="toast-emoji-name" id="toastEmojiName"></div>
</div>

<script>
    (function(){
        const CARD_DATA = {
            "四色花": { up:1, left:2, down:3, right:4 },
            "倒·四色花": { up:2, left:3, down:4, right:1 },
            "五色花": { up:3, left:4, down:1, right:2 },
            "倒·五色花": { up:4, left:1, down:2, right:3 },
            "三相团子": { up:0, left:1, down:9999, right:1 },
            "小电视": { up:2, left:3, down:2, right:3 },
            "OuO": { up:3, left:2, down:2, right:2 }
        };
        const CARD_EMOJI = { "四色花":"🌸","倒·四色花":"🌼","五色花":"🌺","倒·五色花":"🏵️","三相团子":"🍡","小电视":"📺","OuO":"😊" };
        const ALL_CARD_NAMES = Object.keys(CARD_DATA);
        
        // 前端写死的纯静态 5 个高清表情配置
        const emojiList = ["这么强", "嘿嘿嘿哈", "诶嘿", "吃惊", "爱你"];

        function getCardObjByName(name) { return { name, ...CARD_DATA[name] }; }
        function formatVal(val) { return val === 9999 ? '<span class="inf-symbol">∞</span>' : val; }
        function getCardEmoji(name) { return CARD_EMOJI[name] || "🎴"; }

        // ===== 音效系统 =====
        let soundEnabled = false;
        let killAudioEnabled = false;
        let bgmEnabled = false;
        let bgmAudio = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const killAudioBuffers = {};
        const killSoundFiles = {
            1: 'first_blood.ogg',
            2: 'double_kill.ogg',
            3: 'triple_kill.ogg',
            4: 'quadra_kill.ogg',
            5: 'penta_kill.ogg'
        };
        async function preloadKillSounds() {
            for (let count in killSoundFiles) {
                const file = killSoundFiles[count];
                try {
                    const response = await fetch(`data/music/${file}`);
                    if (!response.ok) continue;
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    killAudioBuffers[count] = audioBuffer;
                } catch(e) { console.warn(`预加载击杀音效失败: ${file}`, e); }
            }
        }
        function playKillSound(killCount) {
            if (!killAudioEnabled) return;
            let key = killCount;
            if (key > 5) key = 5;
            const buffer = killAudioBuffers[key];
            if (!buffer) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => playBuffer(buffer)).catch(e => console.log);
            } else { playBuffer(buffer); }
        }
        function playBuffer(buffer) {
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            source.start();
        }
        function initBGM() {
            if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }
            bgmAudio = new Audio('data/music/music.ogg');
            bgmAudio.loop = true;
            bgmAudio.preload = 'auto';
        }
        function startBGM() {
            if (!bgmEnabled) return;
            if (!bgmAudio) initBGM();
            bgmAudio.play().catch(e => {
                const unlockBGM = () => {
                    if (bgmEnabled && bgmAudio && bgmAudio.paused) bgmAudio.play().catch(err => console.log);
                    document.body.removeEventListener('click', unlockBGM);
                };
                document.body.addEventListener('click', unlockBGM, { once: true });
            });
        }
        function stopBGM() { if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; } }
        function playSound(type) {
            if (!soundEnabled) return;
            if (audioCtx.state === 'suspended') audioCtx.resume().catch(e=>console.log);
            try {
                const now = audioCtx.currentTime;
                switch(type) {
                    case 'place': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(200,now); o.frequency.exponentialRampToValueAtTime(120,now+.1); g.gain.setValueAtTime(.4,now); g.gain.exponentialRampToValueAtTime(.01,now+.15); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.15); break; }
                    case 'flip': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(800,now); o.frequency.exponentialRampToValueAtTime(300,now+.05); g.gain.setValueAtTime(.3,now); g.gain.exponentialRampToValueAtTime(.01,now+.08); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.08); break; }
                    case 'click': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(600,now); g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.01,now+.06); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.06); break; }
                    case 'switch': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(1000,now); g.gain.setValueAtTime(.1,now); g.gain.exponentialRampToValueAtTime(.01,now+.04); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.04); break; }
                    case 'victory': { [440,554,659].forEach((f,i)=>{ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; const t=now+i*.12; o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(.3,t); g.gain.exponentialRampToValueAtTime(.01,t+.15); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+.15); }); break; }
                    case 'draw': { [330,392].forEach((f,i)=>{ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; const t=now+i*.2; o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.01,t+.25); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+.25); }); break; }
                    case 'turn': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(1200,now); g.gain.setValueAtTime(.15,now); g.gain.exponentialRampToValueAtTime(.01,now+.08); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.08); break; }
                    case 'emoji': { const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(660,now); o.frequency.setValueAtTime(880,now+.05); g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.01,now+.1); o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+.1); break; }
                }
            } catch(e) {}
        }
        function unlockAudio() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (bgmEnabled && bgmAudio && bgmAudio.paused) bgmAudio.play().catch(e=>console.log);
        }
        document.body.addEventListener('click', function once() { unlockAudio(); }, { once: true });

        let localGrid = Array(9).fill(null);
        let localHandP1 = [], localHandP2 = [];
        let localCurrentTurn = 1;
        let localGameActive = true;
        let localWinnerDeclared = false;
        let localSelectedCardIndex = -1;
        let aiTimeout = null;
        let chainAttackEnabled = false;
        let sequentialAnimEnabled = true;
        let currentGameMode = "twoPlayer";
        let lastSafeMode = "twoPlayer"; // 用于联机拦截后完美切回上一次的模式

        const boardDiv = document.getElementById("board"), handContainer = document.getElementById("handCardsContainer"), turnBadge = document.getElementById("turnBadge"), statusMsgDiv = document.getElementById("statusMsg"), resetBtn = document.getElementById("resetGameBtn"), aiFirstBtn = document.getElementById("aiFirstBtn"), modeSlider = document.getElementById("modeSlider");
        const emojiDialog = document.getElementById("emojiDialog"), emojiToggleBtn = document.getElementById("emojiToggleBtn"), emojiCloseBtn = document.getElementById("emojiCloseBtn"), emojiCancelBtn = document.getElementById("emojiCancelBtn"), emojiGrid = document.getElementById("emojiGrid");
        const emojiToast = document.getElementById("emojiToast"), toastEmojiImg = document.getElementById("toastEmojiImg"), toastSender = document.getElementById("toastSender"), toastEmojiName = document.getElementById("toastEmojiName");
        
        // 获取联机提示框相关 DOM
        const linkDialog = document.getElementById('linkDialog');
        const linkDialogTopClose = document.getElementById('linkDialogTopClose');
        const linkDialogCancel = document.getElementById('linkDialogCancel');
        const linkDialogProceed = document.getElementById('linkDialogProceed');
        
        let toastTimer = null;

        function statusMessage(msg, temp=false) {
            const html = msg.includes('<i') ? msg : `<i class="material-icons">info</i> ${msg}`;
            statusMsgDiv.innerHTML = html;
            if (temp) setTimeout(() => {
                if (statusMsgDiv.innerHTML === html && localGameActive)
                    statusMsgDiv.innerHTML = `<i class="material-icons">info</i> 点击手牌，再点棋盘空格`;
            }, 1500);
        }

        function updateTurnBadge(html) { turnBadge.innerHTML = html; }

        function showEmojiToast(emojiName, senderRole, isSelf = false) {
            if (toastTimer) { clearTimeout(toastTimer); emojiToast.classList.remove('fade-out'); }
            toastEmojiImg.src = `data/webp/${emojiName}.webp`; toastEmojiImg.alt = emojiName;
            toastEmojiName.textContent = emojiName;
            const sender = isSelf ? "你发送了表情" : `${senderRole === 1 ? "炎之阵" : "水之阵"} 发送了表情`;
            toastSender.textContent = sender;
            emojiToast.style.display = 'flex';
            emojiToast.classList.remove('fade-out');
            toastTimer = setTimeout(() => {
                emojiToast.classList.add('fade-out');
                setTimeout(() => { emojiToast.style.display = 'none'; }, 250);
            }, 1500);
        }

        function renderBoard(grid, placedIdx = -1, skipFlipIds = []) {
            const slots = document.querySelectorAll("#board .card-slot");
            for (let i = 0; i < 9; i++) {
                if (skipFlipIds.includes(i)) continue;
                const slot = slots[i], cell = grid[i];
                if (!cell) {
                    slot.className = "card-slot empty-slot";
                    slot.innerHTML = `⬚`;
                    slot.style.animation = "none";
                } else {
                    const card = getCardObjByName(cell.cardName);
                    const ownerClass = cell.owner === 1 ? "owner1" : "owner2";
                    const innerHTML = `<div class="card-layout"><div class="card-name-tag">${card.name}</div><div class="card-top">${formatVal(card.up)}</div><div class="card-middle"><div class="card-left">${formatVal(card.left)}</div><div class="card-emoji">${getCardEmoji(card.name)}</div><div class="card-right">${formatVal(card.right)}</div></div><div class="card-bottom">${formatVal(card.down)}</div></div>`;
                    if (i === placedIdx) {
                        slot.className = `card-slot ${ownerClass}`;
                        slot.innerHTML = innerHTML;
                        slot.style.animation = "none"; void slot.offsetWidth;
                        slot.style.animation = "placeCard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards";
                    } else {
                        slot.className = `card-slot ${ownerClass}`;
                        slot.innerHTML = innerHTML;
                        slot.style.animation = "none";
                    }
                }
            }
        }

        function initBoardDOM() {
            boardDiv.innerHTML = "";
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement("div");
                slot.classList.add("card-slot", "empty-slot");
                slot.innerHTML = `⬚`;
                slot.addEventListener("click", () => onSlotClick(i));
                boardDiv.appendChild(slot);
            }
        }

        function calculateFlips(index, owner, card, grid, enableChain) {
            let allFlipped = [], queue = [index], visited = new Set([index]);
            while (queue.length) {
                const cur = queue.shift();
                const neighbors = [
                    { my:"up", opp:"down", nIdx: cur-3, valid: cur-3>=0 },
                    { my:"down", opp:"up", nIdx: cur+3, valid: cur+3<9 },
                    { my:"left", opp:"right", nIdx: cur-1, valid: cur%3!=0 },
                    { my:"right", opp:"left", nIdx: cur+1, valid: cur%3!=2 }
                ];
                for (let n of neighbors) {
                    if (!n.valid) continue;
                    const nIdx = n.nIdx;
                    if (visited.has(nIdx)) continue;
                    visited.add(nIdx);
                    const neighbor = grid[nIdx];
                    if (!neighbor || neighbor.owner === owner) continue;
                    const neighborCard = getCardObjByName(neighbor.cardName);
                    let myCard = cur === index ? card : getCardObjByName(grid[cur].cardName);
                    let myVal = myCard[n.my] === 9999 ? Infinity : myCard[n.my];
                    let oppVal = neighborCard[n.opp] === 9999 ? Infinity : neighborCard[n.opp];
                    if (myVal > oppVal) {
                        allFlipped.push(nIdx);
                        if (enableChain) queue.push(nIdx);
                    }
                }
            }
            return allFlipped;
        }

        function singleFlipAnimation(slot, newOwner) {
            return new Promise(resolve => {
                slot.style.animation = "flipCardOut 0.2s ease-in forwards";
                playSound('flip');
                setTimeout(() => {
                    const card = getCardObjByName(slot.__cardName);
                    const ownerClass = newOwner === 1 ? "owner1" : "owner2";
                    slot.className = `card-slot ${ownerClass}`;
                    slot.innerHTML = `<div class="card-layout"><div class="card-name-tag">${card.name}</div><div class="card-top">${formatVal(card.up)}</div><div class="card-middle"><div class="card-left">${formatVal(card.left)}</div><div class="card-emoji">${getCardEmoji(card.name)}</div><div class="card-right">${formatVal(card.right)}</div></div><div class="card-bottom">${formatVal(card.down)}</div></div>`;
                    slot.style.animation = "flipCardIn 0.2s ease-out forwards";
                    resolve();
                }, 200);
            });
        }

        async function animateSequential(grid, flippedIdxs, owner) {
            const slots = document.querySelectorAll("#board .card-slot");
            for (let i = 0; i < flippedIdxs.length; i++) {
                const idx = flippedIdxs[i];
                slots[idx].__cardName = grid[idx].cardName;
                await singleFlipAnimation(slots[idx], owner);
                if (i < flippedIdxs.length - 1) await new Promise(r => setTimeout(r, 150));
            }
        }

        function animateSimultaneous(grid, flippedIdxs, owner) {
            const slots = document.querySelectorAll("#board .card-slot");
            return Promise.all(flippedIdxs.map(idx => {
                slots[idx].__cardName = grid[idx].cardName;
                return singleFlipAnimation(slots[idx], owner);
            }));
        }

        function localPlaceCard(slotIndex, cardObj, cardIndex) {
            if (!localGameActive || localGrid[slotIndex] !== null) return false;
            if (localCurrentTurn !== 1 && localCurrentTurn !== 2) return false;
            localGameActive = false;
            localGrid[slotIndex] = { cardName: cardObj.name, owner: localCurrentTurn };
            playSound('place');
            const flipped = calculateFlips(slotIndex, localCurrentTurn, cardObj, localGrid, chainAttackEnabled);
            for (let idx of flipped) localGrid[idx].owner = localCurrentTurn;
            renderBoard(localGrid, slotIndex, flipped);
            if (flipped.length > 0) {
                if (sequentialAnimEnabled) animateSequential(localGrid, flipped, localCurrentTurn);
                else animateSimultaneous(localGrid, flipped, localCurrentTurn);
                playKillSound(flipped.length);
            }
            const handArr = localCurrentTurn === 1 ? localHandP1 : localHandP2;
            if (cardIndex >= 0 && cardIndex < handArr.length) handArr.splice(cardIndex, 1);
            localSelectedCardIndex = -1;
            localCurrentTurn = localCurrentTurn === 1 ? 2 : 1;
            const newHand = localCurrentTurn === 1 ? localHandP1 : localHandP2;
            if (localGrid.every(c => c !== null) || newHand.length === 0) { endLocalGame(); renderLocalHand(true); return true; }
            renderLocalHand(true);
            updateLocalTurnUI();
            statusMessage('回合切换 → ' + (localCurrentTurn === 1 ? '炎之阵' : '水之阵'));
            playSound('turn');
            localGameActive = true;
            if (currentGameMode === "vsAI" && localCurrentTurn === 2) setTimeout(() => { if (localGameActive && localCurrentTurn === 2) triggerAITurn(); }, 250);
            return true;
        }

        function endLocalGame() {
            localGameActive = false; localWinnerDeclared = true;
            let p1=0,p2=0;
            localGrid.forEach(c=>{ if(c) c.owner===1?p1++:p2++; });
            let msg = p1>p2 ? '🏆 炎之阵获胜！' : (p2>p1 ? '🏆 水之阵获胜！' : '🤝 平局');
            statusMessage(msg);
            updateTurnBadge('<i class="material-icons">flag</i> 终局');
            handContainer.innerHTML = '';
            if (p1 > p2 || p2 > p1) playSound('victory');
            else playSound('draw');
        }

        function updateLocalTurnUI() {
            let turnName = localCurrentTurn === 1 ? '炎之阵' : '水之阵';
            if (currentGameMode === "vsAI") {
                if (localCurrentTurn === 1) turnName = '炎之阵 (你)';
                else turnName = 'AI 水之阵';
            }
            const icon = localCurrentTurn === 1 ? 'person' : 'smart_toy';
            updateTurnBadge(`<i class="material-icons">${icon}</i> ${turnName}`);
        }

        function renderLocalHand(force=false) {
            const currentHand = localCurrentTurn === 1 ? localHandP1 : localHandP2;
            if (!localGameActive && localWinnerDeclared) { handContainer.innerHTML = ''; return; }
            if (currentHand.length === 0) {
                handContainer.innerHTML = '<div style="padding:20px;text-align:center;">无可用手牌</div>';
                return;
            }
            if (force) {
                handContainer.innerHTML = "";
                const bgClass = localCurrentTurn === 1 ? "owner1-bg" : "owner2-bg";
                currentHand.forEach((card, idx) => {
                    const div = document.createElement("div");
                    div.className = `hand-card ${bgClass}`;
                    if (localSelectedCardIndex === idx) div.classList.add("selected");
                    div.style.animation = `slideInUp 0.3s ease-out ${idx * 0.05}s backwards`;
                    div.innerHTML = `<div class="card-layout"><div class="card-name-tag">${card.name}</div><div class="card-top">${formatVal(card.up)}</div><div class="card-middle"><div class="card-left">${formatVal(card.left)}</div><div class="card-emoji">${getCardEmoji(card.name)}</div><div class="card-right">${formatVal(card.right)}</div></div><div class="card-bottom">${formatVal(card.down)}</div></div>`;
                    div.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if (!localGameActive) return;
                        if (localSelectedCardIndex === idx) {
                            localSelectedCardIndex = -1;
                            statusMessage("已取消选中");
                        } else {
                            localSelectedCardIndex = idx;
                            statusMessage("选中「" + card.name + "」, 点击棋盘放置");
                        }
                        renderLocalHand(false);
                    });
                    handContainer.appendChild(div);
                });
            } else {
                document.querySelectorAll('#handCardsContainer .hand-card').forEach((card, idx) => card.classList.toggle("selected", idx === localSelectedCardIndex));
            }
        }

        function generateRandomHand() { return Array.from({length:5}, ()=>getCardObjByName(ALL_CARD_NAMES[Math.floor(Math.random()*ALL_CARD_NAMES.length)])); }

        function resetLocalGame(aiFirst=false) {
            if (aiTimeout) clearTimeout(aiTimeout);
            localGrid = Array(9).fill(null);
            localHandP1 = generateRandomHand(); localHandP2 = generateRandomHand();
            localSelectedCardIndex = -1;
            localCurrentTurn = (aiFirst && currentGameMode==="vsAI") ? 2 : 1;
            localGameActive = true; localWinnerDeclared = false;
            initBoardDOM(); renderBoard(localGrid);
            renderLocalHand(true); updateLocalTurnUI();
            if (aiFirst && currentGameMode==="vsAI") {
                statusMessage("🤖 AI先手...");
                triggerAITurn();
            } else statusMessage("新对局！点击手牌再点格子");
        }

        function getAIMove() {
            let best={slot:null,cardIdx:0,score:-1};
            const empty=localGrid.map((c,i)=>c===null?i:-1).filter(i=>i!==-1);
            if(empty.length===0||localHandP2.length===0) return null;
            for(let ci=0;ci<localHandP2.length;ci++){
                for(let slot of empty){
                    let flip=0;
                    const neighbors=[{idx:slot-3,my:"up",opp:"down"},{idx:slot+3,my:"down",opp:"up"},{idx:slot-1,my:"left",opp:"right",v:slot%3!==0},{idx:slot+1,my:"right",opp:"left",v:slot%3!==2}];
                    for(let n of neighbors){
                        if(n.v===false) continue;
                        if(n.idx>=0&&n.idx<9&&localGrid[n.idx]&&localGrid[n.idx].owner!==2){
                            let oppVal=getCardObjByName(localGrid[n.idx].cardName)[n.opp];
                            let myVal=localHandP2[ci][n.my]===9999?Infinity:localHandP2[ci][n.my];
                            if(myVal>(oppVal===9999?Infinity:oppVal)) flip++;
                        }
                    }
                    let score=flip*10+(localHandP2[ci].up+localHandP2[ci].down+localHandP2[ci].left+localHandP2[ci].right)/4;
                    if(score>best.score) best={slot,cardIdx:ci,score};
                }
            }
            return best;
        }

        function triggerAITurn() {
            if(aiTimeout) clearTimeout(aiTimeout);
            aiTimeout = setTimeout(()=>{
                if(!localGameActive||currentGameMode!=="vsAI"||localCurrentTurn!==2) return;
                const move=getAIMove();
                if(move&&move.slot!==null) localPlaceCard(move.slot, localHandP2[move.cardIdx], move.cardIdx);
            },300);
        }

        function onSlotClick(index) {
            if(localSelectedCardIndex === -1) { statusMessage("请先点击手牌选中一张卡牌", true); return; }
            const hand = localCurrentTurn === 1 ? localHandP1 : localHandP2;
            if(localSelectedCardIndex >= hand.length) return;
            localPlaceCard(index, hand[localSelectedCardIndex], localSelectedCardIndex);
        }

        // ===== 核心修改：劫持并拦截联机对决模式切换 =====
        function setGameMode(mode) {
            if (mode === "online") {
                // 如果用户点击了联机对决，呼出 MD3 弹窗并进行拦截，不改变滑块的高亮和实际游戏数据
                playSound('click');
                linkDialog.show();
                return;
            }

            // 记录安全的本地模式状态
            lastSafeMode = mode;
            currentGameMode = mode;
            
            modeSlider.className = `mode-slider-container active-${mode}`;
            aiFirstBtn.style.display = mode === "vsAI" ? "inline-flex" : "none";
            
            resetLocalGame(false);
        }

        // ===== 退出与关闭出站对话框的统一回退逻辑 =====
        function rollbackSliderMode() {
            // 当用户点击取消或右上角关闭时，重置滑动指示器的高亮，重新恢复到最后一次玩的安全模式
            modeSlider.className = `mode-slider-container active-${lastSafeMode}`;
            currentGameMode = lastSafeMode;
        }

        // ===== 挂载出站提醒对话框的所有按钮监听器 =====
        linkDialogCancel.addEventListener('click', () => {
            playSound('click');
            linkDialog.close();
            rollbackSliderMode();
        });

        linkDialogTopClose.addEventListener('click', () => {
            playSound('click');
            linkDialog.close();
            rollbackSliderMode();
        });

        linkDialog.addEventListener('cancel', () => {
            // 防止用户按键盘 ESC 键关闭后造成滑块位置对齐错乱
            rollbackSliderMode();
        });

        linkDialogProceed.addEventListener('click', () => {
            playSound('click');
            // 打开新的联机版专属独立域名
            window.open('https://math.youzix.top/', '_blank', 'noopener,noreferrer');
            linkDialog.close();
            rollbackSliderMode();
        });

        // ===== 纯前端静态加载表情包系统 =====
        function renderEmojiGrid() {
            if(!emojiGrid) return;
            emojiGrid.innerHTML = '';
            emojiList.forEach(name => {
                const card = document.createElement('div');
                card.className = 'emoji-card';
                card.setAttribute('data-emoji', name);
                const img = document.createElement('img');
                img.src = `data/webp/${name}.webp`;
                img.alt = name;
                img.loading = 'lazy';
                card.appendChild(img);
                card.addEventListener('click', (e) => { e.stopPropagation(); sendEmoji(card, name); });
                emojiGrid.appendChild(card);
            });
        }

        function sendEmoji(cardElement, emojiName) {
            cardElement.classList.add('sending');
            // 在离线无网络下，直接在本局游戏内为当前出牌阵营弹出发送效果提示
            showEmojiToast(emojiName, localCurrentTurn, true);
            playSound('emoji');
            setTimeout(() => { closeEmojiPanel(); setTimeout(() => cardElement.classList.remove('sending'), 100); }, 300);
        }

        function openEmojiPanel() { emojiDialog.show(); }
        function closeEmojiPanel() { emojiDialog.close(); }

        const chainAttackSwitch = document.getElementById('chainAttackSwitch');
        const animStyleSwitch = document.getElementById('animStyleSwitch');
        const soundToggle = document.getElementById('soundToggle');
        const killAudioSwitch = document.getElementById('killAudioSwitch');
        const bgmSwitch = document.getElementById('bgmSwitch');

        if (animStyleSwitch) { sequentialAnimEnabled = animStyleSwitch.selected; animStyleSwitch.addEventListener('change', e => { sequentialAnimEnabled = e.target.selected; statusMessage(sequentialAnimEnabled ? '顺序播放模式' : '同步播放模式', true); playSound('switch'); }); }
        if (chainAttackSwitch) chainAttackSwitch.addEventListener('change', e => { chainAttackEnabled = e.target.selected; statusMessage(chainAttackEnabled ? '⚡ 连锁攻击已开启' : '连锁攻击已关闭', true); playSound('switch'); });
        if (soundToggle) soundToggle.addEventListener('change', e => { soundEnabled = e.target.selected; playSound('switch'); });
        if (killAudioSwitch) { killAudioSwitch.selected = killAudioEnabled; killAudioSwitch.addEventListener('change', e => { killAudioEnabled = e.target.selected; statusMessage(killAudioEnabled ? '击杀音效已开启' : '击杀音效已关闭', true); playSound('switch'); }); }
        if (bgmSwitch) { const savedBGM = localStorage.getItem('game_bgm') === 'true'; bgmEnabled = savedBGM; bgmSwitch.selected = bgmEnabled; bgmSwitch.addEventListener('change', e => { bgmEnabled = e.target.selected; localStorage.setItem('game_bgm', bgmEnabled); if (bgmEnabled) { initBGM(); startBGM(); } else { stopBGM(); } playSound('switch'); statusMessage(bgmEnabled ? '背景音乐已开启' : '背景音乐已关闭', true); }); }

        emojiToggleBtn?.addEventListener('click', openEmojiPanel);
        emojiCloseBtn?.addEventListener('click', () => { playSound('click'); closeEmojiPanel(); });
        emojiCancelBtn?.addEventListener('click', () => { playSound('click'); closeEmojiPanel(); });
        document.getElementById("settingsButton")?.addEventListener('click', () => { playSound('click'); document.getElementById("settingsDialog").show(); });
        resetBtn.addEventListener('click', () => { playSound('click'); resetLocalGame(false); });
        aiFirstBtn.addEventListener('click', () => { playSound('click'); resetLocalGame(true); });
        document.querySelectorAll(".mode-option").forEach(o=>o.addEventListener('click', () => { setGameMode(o.dataset.mode); }));

        preloadKillSounds();
        if (bgmEnabled) { initBGM(); startBGM(); }

        // 页面纯前端初始化
        initBoardDOM();
        resetLocalGame(false);
        setGameMode("twoPlayer");
        renderEmojiGrid();
    })();
</script>
</body>
</html>
